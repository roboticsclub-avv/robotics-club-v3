# Sample workflow for building and deploying a Next.js site to GitHub Pages
name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main", "Nishanth-final"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./reference-v2/package-lock.json
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            ./reference-v2/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('reference-v2/package-lock.json') }}-${{ hashFiles('reference-v2/**/*.[jt]s', 'reference-v2/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('reference-v2/package-lock.json') }}-
      - name: Install dependencies
        run: npm ci
        working-directory: ./reference-v2
      - name: Build with Next.js
        run: npm run build
        working-directory: ./reference-v2
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://eeseizfyjbuleedynhlx.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_Xfn6NxvniDvcmCZs1KkYbA_IESdYLc2"
          NEXT_PUBLIC_BASE_PATH: "/robotics-club-v3"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./reference-v2/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
